services:

  # ──────────────────────────────────────────────
  # OGX Server (Open GenAI Stack)
  # ──────────────────────────────────────────────
  ogx:
    image: ${OGX_IMAGE}
    ports:
      - "8321:8321"
    environment:
      - OLLAMA_URL=${OLLAMA_URL}
    volumes:
      - ogx_data:/root/.ogx
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8321/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - ogx-network

  # ──────────────────────────────────────────────
  # Qdrant (Vector DB)
  # ──────────────────────────────────────────────
  qdrant:
    image: docker.io/qdrant/qdrant:${QDRANT_VERSION}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ogx-network

volumes:
  ogx_data:
  qdrant_data:

networks:
  ogx-network:
    driver: bridge
